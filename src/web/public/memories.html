<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memories - Memory Server</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>(function () { try { const s = JSON.parse(localStorage.getItem("persistent-memory-server") || "{}"); if (s.theme) document.documentElement.className = s.theme; } catch (e) { } }());</script>
</head>

<body>
  <div class="app">
    <nav>
      <a href="/" class="logo">Memory Server</a>
      <a href="/">Dashboard</a>
      <a href="/memories.html" class="active">Memories</a>
      <a href="/snippets.html">Snippets</a>
      <a href="/agents.html">Agents</a>
      <a href="/sessions.html">Sessions</a>
      <button id="identity-btn" class="btn btn-sm" onclick="openIdentityModal()" style="margin-left: auto; font-family: var(--font-mono); font-size: 11px"></button>
      <button id="theme-toggle" class="btn btn-sm" onclick="toggleTheme()">🌙</button>
    </nav>

    <div class="page-header">
      <h1>Memories</h1>
      <button class="btn btn-primary" onclick="openCreatePanel()">+ New Memory</button>
    </div>

    <div class="two-col-layout">
      <div class="two-col-left">
        <div class="tabs" id="scope-tabs">
          <button class="tab active" data-scope="">All</button>
          <button class="tab" data-scope="global">Global</button>
          <button class="tab" data-scope="project">Project</button>
          <button class="tab" data-scope="file">File</button>
        </div>

        <div class="toolbar" style="margin-bottom: 8px">
          <input type="search" aria-label="search-input" id="search-input" placeholder="Search memories..." />
          <input type="text" aria-label="tag-filter" id="tag-filter" placeholder="Filter by tags"
            style="max-width: 180px" />
        </div>
        <div class="toolbar" style="margin-bottom: 8px">
          <input type="text" aria-label="user-filter" id="user-filter" placeholder="Filter by user"
            style="max-width: 160px" />
          <input type="text" aria-label="device-filter" id="device-filter" placeholder="Filter by device"
            style="max-width: 160px" />
        </div>
        <div class="toolbar" style="margin-bottom: 8px">
          <input type="text" aria-label="project-filter" id="project-filter" placeholder="Filter by project path"
            list="project-paths-list" style="flex: 1" />
          <datalist id="project-paths-list"></datalist>
        </div>

        <div class="bulk-bar" id="bulk-bar">
          <span class="bulk-count" id="bulk-count">0 selected</span>
          <button class="btn btn-sm btn-danger" onclick="bulkDelete()">Delete Selected</button>
        </div>

        <div class="card-list" id="memory-list">
          <div class="empty-state">
            <p>Loading...</p>
          </div>
        </div>
      </div>

      <div class="two-col-right" id="detail-panel">
        <div class="panel-empty">
          <p>Select a memory or create a new one</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/memories.js"></script>
</body>

</html>
