<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agents - Memory Server</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="app">
    <nav>
      <a href="/" class="logo">Memory Server</a>
      <a href="/">Dashboard</a>
      <a href="/memories.html">Memories</a>
      <a href="/snippets.html">Snippets</a>
      <a href="/agents.html" class="active">Agents</a>
    </nav>

    <div class="page-header">
      <h1>Agents</h1>
      <button class="btn btn-primary" onclick="openCreateModal()">+ New Agent</button>
    </div>

    <div class="toolbar">
      <input type="search" aria-label="search-input" id="search-input" placeholder="Search agents..." />
      <input type="text" aria-label="tag-filter" id="tag-filter" placeholder="Filter by tags"
        style="max-width: 200px" />
    </div>

    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-count" id="bulk-count">0 selected</span>
      <button class="btn btn-sm btn-danger" onclick="bulkDelete()">Delete Selected</button>
    </div>

    <div class="card-list" id="agent-list">
      <div class="empty-state">
        <p>Loading...</p>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display: none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Agent</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="agent-form" onsubmit="handleSubmit(event)">
        <input type="hidden" id="form-id" />
        <div class="form-group">
          <label for="form-name">Name</label>
          <input type="text" id="form-name" required />
        </div>
        <div class="form-group">
          <label for="form-description">Description</label>
          <input type="text" id="form-description" required />
        </div>
        <div class="form-group">
          <label for="form-system-prompt">System Prompt</label>
          <textarea id="form-system-prompt" rows="8" required></textarea>
        </div>
        <div class="form-group">
          <label for="form-tools">Tools (comma-separated tool names)</label>
          <input type="text" id="form-tools" placeholder="e.g. memory_create, memory_search" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="form-permission">Permission</label>
            <select id="form-permission">
              <option value="read-only">Read Only</option>
              <option value="read-write">Read Write</option>
            </select>
          </div>
          <div class="form-group">
            <label for="form-permission-expires">Permission Expires (optional)</label>
            <input type="datetime-local" id="form-permission-expires" />
          </div>
        </div>
        <div class="form-group">
          <label for="form-tags">Tags (comma-separated)</label>
          <input type="text" id="form-tags" placeholder="e.g. helper, review" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal()">Cancel</button>
          <button type="button" class="btn btn-danger" id="delete-btn" style="display: none"
            onclick="handleDelete()">Delete</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Modal -->
  <div class="modal-overlay" id="view-overlay" style="display: none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="view-title"></h2>
        <button class="modal-close" onclick="closeViewModal()">&times;</button>
      </div>
      <div id="view-meta" class="card-meta" style="margin-bottom: 12px"></div>
      <div id="view-description" style="margin-bottom: 12px; color: var(--text-secondary)"></div>
      <label style="margin-bottom: 4px">System Prompt</label>
      <div id="view-prompt" class="markdown-content"
        style="background: var(--bg-secondary); padding: 12px; border-radius: var(--radius); margin-bottom: 12px"></div>
      <div id="view-tools" style="margin-bottom: 12px"></div>
      <div id="view-tags" class="tags"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeViewModal()">Close</button>
        <button class="btn btn-primary" id="view-edit-btn">Edit</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/agents.js"></script>
</body>

</html>
