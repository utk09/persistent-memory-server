<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions - Memory Server</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script>(function () { try { const s = JSON.parse(localStorage.getItem("persistent-memory-server") || "{}"); if (s.theme) document.documentElement.className = s.theme; } catch (e) { } }());</script>
</head>

<body>
  <div class="app">
    <nav>
      <a href="/" class="logo">Memory Server</a>
      <a href="/">Dashboard</a>
      <a href="/memories.html">Memories</a>
      <a href="/snippets.html">Snippets</a>
      <a href="/agents.html">Agents</a>
      <a href="/sessions.html" class="active">Sessions</a>
      <button id="identity-btn" class="btn btn-sm" onclick="openIdentityModal()" style="margin-left: auto; font-family: var(--font-mono); font-size: 11px"></button>
      <button id="theme-toggle" class="btn btn-sm" onclick="toggleTheme()">🌙</button>
    </nav>

    <div class="page-header">
      <h1>Sessions</h1>
      <button class="btn" onclick="loadSessions()">Refresh</button>
    </div>

    <div class="two-col-layout">
      <div class="two-col-left">
        <div class="toolbar" style="margin-bottom: 8px">
          <input type="text" aria-label="user-filter" id="user-filter" placeholder="Filter by user"
            style="max-width: 160px" />
          <input type="text" aria-label="device-filter" id="device-filter" placeholder="Filter by device"
            style="max-width: 160px" />
          <select id="active-filter" style="width: auto; min-width: 110px">
            <option value="">All</option>
            <option value="true">Active</option>
            <option value="false">Closed</option>
          </select>
        </div>

        <div class="card-list" id="session-list">
          <div class="empty-state">
            <p>Loading...</p>
          </div>
        </div>
      </div>

      <div class="two-col-right" id="detail-panel">
        <div class="panel-empty">
          <p>Select a session to view details</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/sessions.js"></script>
</body>

</html>
