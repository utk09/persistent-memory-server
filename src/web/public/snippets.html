<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snippets - Memory Server</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="app">
    <nav>
      <a href="/" class="logo">Memory Server</a>
      <a href="/">Dashboard</a>
      <a href="/memories.html">Memories</a>
      <a href="/snippets.html" class="active">Snippets</a>
      <a href="/agents.html">Agents</a>
    </nav>

    <div class="page-header">
      <h1>Snippets</h1>
      <button class="btn btn-primary" onclick="openCreateModal()">+ New Snippet</button>
    </div>

    <div class="toolbar">
      <input type="search" aria-label="search-input" id="search-input" placeholder="Search snippets..." />
      <select id="type-filter">
        <option value="">All Types</option>
        <option value="script">Script</option>
        <option value="snippet">Snippet</option>
        <option value="template">Template</option>
        <option value="reference">Reference</option>
        <option value="tool">Tool</option>
      </select>
      <input type="text" aria-label="tag-filter" id="tag-filter" placeholder="Filter by tags"
        style="max-width: 200px" />
    </div>

    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-count" id="bulk-count">0 selected</span>
      <button class="btn btn-sm btn-danger" onclick="bulkDelete()">Delete Selected</button>
    </div>

    <div class="card-list" id="snippet-list">
      <div class="empty-state">
        <p>Loading...</p>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display: none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Snippet</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="snippet-form" onsubmit="handleSubmit(event)">
        <input type="hidden" id="form-id" />
        <div class="form-group">
          <label for="form-title">Title</label>
          <input type="text" id="form-title" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="form-type">Type</label>
            <select id="form-type">
              <option value="snippet">Snippet</option>
              <option value="script">Script</option>
              <option value="template">Template</option>
              <option value="reference">Reference</option>
              <option value="tool">Tool</option>
            </select>
          </div>
          <div class="form-group">
            <label for="form-language">Language (optional)</label>
            <input type="text" id="form-language" placeholder="e.g. python, bash, javascript" />
          </div>
        </div>
        <div class="form-group">
          <label for="form-content">Content</label>
          <textarea id="form-content" rows="10" required></textarea>
        </div>
        <div class="form-group">
          <label for="form-tags">Tags (comma-separated)</label>
          <input type="text" id="form-tags" placeholder="e.g. utility, bash" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal()">Cancel</button>
          <button type="button" class="btn btn-danger" id="delete-btn" style="display: none"
            onclick="handleDelete()">Delete</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Modal -->
  <div class="modal-overlay" id="view-overlay" style="display: none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="view-title"></h2>
        <button class="modal-close" onclick="closeViewModal()">&times;</button>
      </div>
      <div id="view-meta" class="card-meta" style="margin-bottom: 12px"></div>
      <div id="view-content" class="markdown-content"></div>
      <div id="view-tags" class="tags" style="margin-top: 12px"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeViewModal()">Close</button>
        <button class="btn btn-primary" id="view-edit-btn">Edit</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/snippets.js"></script>
</body>

</html>
